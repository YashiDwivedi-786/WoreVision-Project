<!DOCTYPE html>
<html>

<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/product.css">
</head>

<body>

    <div class="product-container">
        <img id="productImage" class="product-img">
        <div class="product-info">
            <h1 id="productName"></h1>
            <p id="productPrice"></p>
            <div class="rating">
                <span class="stars">★★★★☆</span>
                <span class="rating-number">(4.2 / 5)</span>
            </div>
            <p class="description">
                Premium eyewear designed for comfort, durability and style.
                Perfect for everyday use.
            </p>
            <button onclick="addToCart">Add to Cart</button>
        </div>
    </div>
    <h2 class="related-title">Customers also viewed</h2>
<div class="related-products" id="relatedProducts"></div>
    <script src="js/product.js"></script>

</body>

</html>
